packversion: 1
name: databricks-services
version: 0.1.0
metadata:
  author: GSA-TTS
platforms:
- os: linux
  arch: amd64
# - os: darwin
#   arch: amd64
terraform_upgrade_path:
- version: 1.10.9
terraform_binaries:
- name: tofu
  version: 1.10.9
  source: https://github.com/opentofu/opentofu/archive/v1.10.9.zip
  default: true
- name: terraform-provider-databricks
  version: 1.57.0
  source: https://github.com/databricks/terraform-provider-databricks/archive/v1.57.0.zip
  url_template: https://github.com/databricks/terraform-provider-databricks/releases/download/v${version}/terraform-provider-databricks_${version}_${os}_${arch}.zip
env_config_mapping:
  DATABRICKS_HOST: databricks.host
  DATABRICKS_TOKEN: databricks.token
service_definitions:
- databricks-workspace.yml